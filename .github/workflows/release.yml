name: Release to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.3.0)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'test'
        type: choice
        options:
        - test
        - prod

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to Test PyPI
      if: inputs.environment == 'test'
      run: |
        twine upload --repository testpypi dist/*
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}

    - name: Publish to PyPI
      if: inputs.environment == 'prod'
      run: |
        twine upload dist/*
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    needs: release
    steps:
    - name: Install package from ${{ inputs.environment }}
      run: |
        if [ "${{ inputs.environment }}" == "test" ]; then
          pip install --index-url https://test.pypi.org/simple/ enlightenlm==${{ inputs.version }}
        else
          pip install enlightenlm==${{ inputs.version }}
        fi
        python -c "import enlighten; print(f'EnlightenLM version: {enlighten.__version__}')"
