groups:
  - name: enlightenlm_alerts
    interval: 30s
    rules:
      - alert: EnlightenLMAPIHighLatency
        expr: histogram_quantile(0.95, rate(enlightenlm_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM API 高延迟告警"
          description: "API 响应时间 P95 > 5s，当前值: {{ $value }}s"

      - alert: EnlightenLMAPIHighErrorRate
        expr: rate(enlightenlm_requests_total{status=~"5.."}[5m]) / rate(enlightenlm_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "EnlightenLM API 高错误率告警"
          description: "API 5xx 错误率 > 5%，当前值: {{ $value | humanizePercentage }}"

      - alert: EnlightenLMSecurityEventsHigh
        expr: rate(enlightenlm_van_events_total[5m]) / rate(enlightenlm_requests_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM 安全事件过多告警"
          description: "VAN 安全事件率 > 10%，当前值: {{ $value | humanizePercentage }}"

      - alert: EnlightenLMServiceDown
        expr: up{job="enlightenlm-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EnlightenLM 服务不可用"
          description: "EnlightenLM API 服务已停止运行超过 1 分钟"

      - alert: EnlightenLMMemoryUsageHigh
        expr: enlightenlm_memory_usage_percent > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM 内存使用率过高"
          description: "内存使用率 > 85%，当前值: {{ $value }}%"

      - alert: EnlightenLMMemoryUsageCritical
        expr: enlightenlm_memory_usage_percent > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "EnlightenLM 内存使用率临界"
          description: "内存使用率 > 95%，当前值: {{ $value }}%"

      - alert: EnlightenLMCpuUsageHigh
        expr: enlightenlm_cpu_usage_percent > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM CPU 使用率过高"
          description: "CPU 使用率 > 90%，当前值: {{ $value }}%"

      - alert: EnlightenLMMetacognitionFailureHigh
        expr: rate(enlightenlm_metacognition_failures_total[5m]) / rate(enlightenlm_metacognition_checks_total[5m]) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM 元认知自检失败率过高"
          description: "元认知自检失败率 > 20%，当前值: {{ $value | humanizePercentage }}"

      - alert: EnlightenLMEngramRewindHigh
        expr: rate(enlightenlm_engram_rewinds_total[5m]) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM Engram 回退频繁"
          description: "Engram 回退率 > 10次/5分钟，当前值: {{ $value }}次/5分钟"

      - alert: EnlightenLMEntropyAnomaly
        expr: abs(enlightenlm_entropy_mean - avg(enlightenlm_entropy_mean[1h])) > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "EnlightenLM 熵值异常"
          description: "熵值与过去1小时平均值偏差 > 0.5，当前值: {{ $value }}"
