# =============================================================================
# EnlightenLM docker-compose 编排配置
# 支持多种部署场景：API模式、本地GPU模式、完整生产环境
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API 模式服务 - 使用外部DeepSeek API，轻量级部署
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: enlightenlm-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - ENLIGHTEN_MODE=balanced
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL_NAME=deepseek-chat
      - USE_LOCAL_MODEL=false
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - enlighten-network

  # ---------------------------------------------------------------------------
  # 本地GPU模式服务 - 使用本地Transformer模型
  # ---------------------------------------------------------------------------
  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-gpu
    container_name: enlightenlm-api-gpu
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - ENLIGHTEN_MODE=full
      - USE_LOCAL_MODEL=true
      - LOCAL_MODEL_NAME=Qwen/Qwen2-7B
      - CUDA_VISIBLE_DEVICES=0
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - enlighten-network

  # ---------------------------------------------------------------------------
  # 生产环境完整部署 - API + Redis + Nginx + Prometheus
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: enlightenlm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - enlighten-network
    profiles:
      - production

  redis:
    image: redis:7-alpine
    container_name: enlightenlm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - enlighten-network
    profiles:
      - production

  prometheus:
    image: prom/prometheus:latest
    container_name: enlightenlm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - enlighten-network
    profiles:
      - production

  grafana:
    image: grafana/grafana:latest
    container_name: enlightenlm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - enlighten-network
    profiles:
      - production

networks:
  enlighten-network:
    driver: bridge
    name: enlighten-network

volumes:
  redis-data:
    name: enlightenlm-redis-data
  prometheus-data:
    name: enlightenlm-prometheus-data
  grafana-data:
    name: enlightenlm-grafana-data
  model-cache:
    name: enlightenlm-model-cache
