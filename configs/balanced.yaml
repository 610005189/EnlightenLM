enlighten:
  mode: "balanced"

  model_provider:
    use_local_model: false
    local_model_name: "qwen2.5:14b"
    api_provider: "ollama"
    api_model: "deepseek-chat"

  components:
    van_stream:
      level: "medium"  # light | medium | full
      van_threshold: 0.9
      sensitive_keywords:
        - "暴力"
        - "犯罪"
        - "毒品"
        - "赌博"

    gate_fusion:
      enabled: true
      fusion_threshold: 0.7

    dmn_noise:
      enabled: false

    working_memory:
      capacity: 512
      refresh_interval: 32
      use_topk_refresh: true

    entropy_monitor:
      window_size: 20

    cutoff:
      low_entropy_threshold: 0.5
      low_variance_threshold: 0.05
      min_duration: 5
      cooldown_steps: 10

    async_review:
      enabled: false
    log_history_size: 100