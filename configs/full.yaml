enlighten:
  mode: "full"

  components:
    van_stream:
      level: "full"  # light | medium | full
      van_threshold: 0.9
      sensitive_keywords:
        - "暴力"
        - "犯罪"
        - "毒品"
        - "赌博"
        - "色情"
        - "欺诈"
        - "仇恨"
        - "自伤"

    gate_fusion:
      enabled: true
      fusion_threshold: 0.7

    dmn_noise:
      enabled: true
      noise_strength: 0.1

    working_memory:
      capacity: 512
      refresh_interval: 32
      use_topk_refresh: true

    entropy_monitor:
      window_size: 20

    cutoff:
      low_entropy_threshold: 0.5
      low_variance_threshold: 0.05
      min_duration: 5
      cooldown_steps: 10

    async_review:
      enabled: true
      model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
      interval: 32
      queue_size: 100
    log_history_size: 1000