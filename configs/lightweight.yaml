enlighten:
  mode: "lightweight"

  components:
    van_stream:
      level: "light"  # light | medium | full
      van_threshold: 0.9
      sensitive_keywords:
        - "暴力"
        - "犯罪"

    gate_fusion:
      enabled: false

    dmn_noise:
      enabled: false

    working_memory:
      capacity: 256
      refresh_interval: 0  # 不刷新
      use_topk_refresh: false

    entropy_monitor:
      window_size: 20

    cutoff:
      low_entropy_threshold: 0.5
      low_variance_threshold: 0.05
      min_duration: 5
      cooldown_steps: 5

    async_review:
      enabled: false
    log_history_size: 10